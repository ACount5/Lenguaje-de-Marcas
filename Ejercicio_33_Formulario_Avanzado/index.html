<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario</title>
  <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>

<h1>Registro</h1>

<form id="formulario">

  <div class="campo" id="grupo-usuario">
    <label>Usuario</label>
    <input type="text" id="usuario">
    <span class="mensaje-error">Usuario inválido</span>
  </div>

  <div class="campo" id="grupo-email">
    <label>Email</label>
    <input type="text" id="email">
    <span class="mensaje-error">Email inválido</span>
  </div>

  <div class="campo" id="grupo-password">
    <label>Contraseña</label>
    <input type="password" id="password">
    <span class="mensaje-error">Mínimo 8 caracteres, 1 mayúscula y 1 número</span>
  </div>

  <div class="campo" id="grupo-password2">
    <label>Confirmar contraseña</label>
    <input type="password" id="password2">
    <span class="mensaje-error">Las contraseñas no coinciden</span>
  </div>

  <div class="campo" id="grupo-telefono">
    <label>Teléfono</label>
    <input type="text" id="telefono">
    <span class="mensaje-error">Debe tener 9 dígitos</span>
  </div>

  <button type="submit">Enviar</button>

</form>

<script src="src/js/main.js"></script>
</body>
</html>
